{{- if and .Values.session.createSecret (not .Values.session.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aigateway-portal.sessionSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aigateway-portal.labels" . | nindent 4 }}
type: Opaque
stringData:
  session-secret: {{ .Values.session.secretKey | quote }}
  invite-code: {{ .Values.session.inviteCode | quote }}
  cookie-name: {{ .Values.session.cookieName | quote }}
{{- end }}
