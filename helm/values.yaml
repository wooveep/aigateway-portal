name: "aigateway-portal"
nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

image:
  repository: aigateway/portal
  tag: "0.2.0-dev-20260415214151"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: ""
  host: portal.aigateway.io
  path: /
  pathType: Prefix
  annotations: {}
  tls: []

database:
  # When mysql.enabled=false, default host/secret resolve to higress-core mysql:
  # host: "<release>-aigateway-core-mysql"
  # secret: "<release>-aigateway-core-db"
  host: ""
  port: 3306
  existingSecret: ""
  createSecret: true
  username: portal
  password: portal
  name: aigateway_portal
  rootPassword: root
  usernameKey: username
  passwordKey: password
  databaseKey: database
  rootPasswordKey: root-password

session:
  existingSecret: ""
  createSecret: true
  secretKey: change-me-session-secret
  inviteCode: WELCOME-2026
  cookieName: aigateway_portal_session

backend:
  replicaCount: 1
  # Deprecated: use top-level image instead.
  image:
    repository: aigateway/portal
    tag: "0.2.0-dev-20260415214151"
    pullPolicy: IfNotPresent
  # Deprecated: use top-level service.port instead.
  service:
    type: ClusterIP
    port: 8081
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  resources: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []
  sessionTTLHours: 72
  sessionSecure: false
  corePrometheusURL: ""
  usageSyncEnabled: true
  usageSyncSeconds: 300
  keyAuthSyncEnabled: true
  keyAuthSyncSeconds: 2
  rechargeFallbackAvgCostPer1K: 0.02
  inviteExpireDays: 365
  shutdownGraceSeconds: 10
  displayName: AIGateway 用户门户
  gateway:
    publicBaseURL: ""
    internalBaseURL: ""
    publicHostFallback: ""
    serviceName: ""
  serviceAccount:
    create: true
    name: ""
  rbac:
    create: true
  k8s:
    namespace: ""
    kubeconfig: ""

frontend:
  # Deprecated: use top-level service instead.
  service:
    type: ClusterIP
    port: 8081
  # Deprecated: use top-level ingress instead.
  ingress:
    enabled: false
    className: ""
    host: portal.aigateway.io
    path: /
    pathType: Prefix
    annotations: {}
    tls: []

mysql:
  # Keep bundled mysql optional for standalone portal chart usage.
  enabled: true
  image:
    repository: mariadb
    tag: "11.4"
    pullPolicy: IfNotPresent
  service:
    name: ""
    port: 3306
  auth:
    existingSecret: ""
    username: portal
    password: portal
    database: aigateway_portal
    rootPassword: root
    usernameKey: username
    passwordKey: password
    databaseKey: database
    rootPasswordKey: root-password
  primary:
    persistence:
      enabled: true
      storageClass: ""
      size: 10Gi
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  resources: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []
