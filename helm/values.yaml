name: "aigateway-portal"
nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

image:
  repository: aigateway/portal
  tag: "1.0.0-dev-20260424135639"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: ""
  host: portal.aigateway.io
  path: /
  pathType: Prefix
  annotations: {}
  tls: []

database:
  driver: postgres
  # Default host resolves to "<release>-aigateway-core-postgresql-pgpool" when empty.
  # secret: "<release>-aigateway-core-db"
  host: ""
  port: 5432
  existingSecret: ""
  createSecret: true
  username: portal
  password: portal
  name: aigateway_portal
  usernameKey: username
  passwordKey: password
  databaseKey: database
  params: "sslmode=disable"

session:
  existingSecret: ""
  createSecret: true
  secretKey: change-me-session-secret
  inviteCode: WELCOME-2026
  cookieName: aigateway_portal_session

backend:
  replicaCount: 1
  # Deprecated: use top-level image instead.
  image:
    repository: aigateway/portal
    tag: "1.0.0-dev-20260424135639"
    pullPolicy: IfNotPresent
  # Deprecated: use top-level service.port instead.
  service:
    type: ClusterIP
    port: 8081
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  resources: {}
  nodeSelector: {}
  affinity: {}
  topologySpreadConstraints: []
  tolerations: []
  pdb:
    enabled: false
    minAvailable: 1
  sessionTTLHours: 72
  sessionSecure: false
  corePrometheusURL: ""
  usageSyncEnabled: true
  usageSyncSeconds: 300
  keyAuthSyncEnabled: true
  keyAuthSyncSeconds: 2
  dbAutoMigrate: true
  rechargeFallbackAvgCostPer1K: 0.02
  inviteExpireDays: 365
  shutdownGraceSeconds: 10
  displayName: AIGateway 用户门户
  publicBaseURL: ""
  gateway:
    publicBaseURL: ""
    internalBaseURL: ""
    publicHostFallback: ""
    serviceName: ""
  serviceAccount:
    create: true
    name: ""
  rbac:
    create: true
  k8s:
    namespace: ""
    kubeconfig: ""

frontend:
  # Deprecated: use top-level service instead.
  service:
    type: ClusterIP
    port: 8081
  # Deprecated: use top-level ingress instead.
  ingress:
    enabled: false
    className: ""
    host: portal.aigateway.io
    path: /
    pathType: Prefix
    annotations: {}
    tls: []
